version: 1
metadata:
  owner_agent: "8"
  task_id: "PM-A-006"
  scope: "observability-bootstrap"
  source_of_truth: "infra/observability/alerts/alert-policies.yaml"

defaults:
  severity: sev2
  for: 5m
  labels:
    service: observability-stack
    team: sre

policies:
  - id: kill_switch_activated
    description: Global kill switch activation should page immediately.
    expr: increase(kill_switch_activated_total[1m]) > 0
    for: 0m
    severity: sev1
    labels:
      category: risk
      runbook: docs/runbooks/observability-bootstrap.md#incident-alert-response

  - id: hard_risk_breach
    description: Hard-risk breach count must remain zero.
    expr: increase(hard_risk_breach_total[5m]) > 0
    for: 0m
    severity: sev1
    labels:
      category: risk
      runbook: docs/runbooks/observability-bootstrap.md#incident-alert-response

  - id: data_staleness_breach
    description: Pyth or venue quote freshness exceeded SLO thresholds.
    expr: max(data_feed_staleness_ms{feed=~"pyth|venue_quote"}) > 3000
    for: 3m
    severity: sev2
    labels:
      category: data-freshness
      runbook: docs/runbooks/observability-bootstrap.md#data-staleness-triage

  - id: provider_error_spike
    description: Provider request errors exceed 5% over 10m.
    expr: sum(rate(provider_request_errors_total[10m])) / clamp_min(sum(rate(provider_requests_total[10m])), 1) > 0.05
    for: 10m
    severity: sev2
    labels:
      category: provider-health
      runbook: docs/runbooks/observability-bootstrap.md#provider-outage-triage

  - id: settlement_backlog_breach
    description: Settlement backlog exceeds safe threshold.
    expr: max(settlement_backlog_items) > 50
    for: 10m
    severity: sev2
    labels:
      category: settlement
      runbook: docs/runbooks/observability-bootstrap.md#settlement-backlog-triage

  - id: decision_latency_slo_breach
    description: p95 decision latency above PRD SLO.
    expr: histogram_quantile(0.95, sum(rate(decision_latency_ms_bucket[10m])) by (le)) > 700
    for: 10m
    severity: sev2
    labels:
      category: slos
      rollback_candidate: "true"
      runbook: docs/runbooks/observability-bootstrap.md#slo-collapse-and-rollback-evaluation

  - id: dispatch_latency_slo_breach
    description: p95 dispatch latency above PRD SLO.
    expr: histogram_quantile(0.95, sum(rate(dispatch_latency_ms_bucket[10m])) by (le)) > 500
    for: 10m
    severity: sev2
    labels:
      category: slos
      rollback_candidate: "true"
      runbook: docs/runbooks/observability-bootstrap.md#slo-collapse-and-rollback-evaluation

  - id: prediction_ingestion_lag_breach
    description: Prediction ingestion p95 lag exceeds Stage A budget.
    expr: histogram_quantile(0.95, sum(rate(ingestion_lag_ms_bucket{pipeline="prediction_markets"}[10m])) by (le)) > 2500
    for: 10m
    severity: sev2
    labels:
      category: ingestion
      stage_gate: stage-a
      runbook: docs/runbooks/prediction-stage-a-observability.md#ingestion-lag-triage

  - id: prediction_quote_integrity_failure_spike
    description: Quote integrity failures exceed 1% over 10m window.
    expr: sum(rate(quote_integrity_failures_total[10m])) / clamp_min(sum(rate(quote_integrity_checks_total[10m])), 1) > 0.01
    for: 10m
    severity: sev2
    labels:
      category: quote-integrity
      stage_gate: stage-a
      runbook: docs/runbooks/prediction-stage-a-observability.md#quote-integrity-failure-triage

  - id: prediction_stale_quote_rejection_spike
    description: Stale quote rejections indicate feed degradation.
    expr: sum(rate(stale_quote_rejections_total[10m])) by (venue) > 0.5
    for: 10m
    severity: sev2
    labels:
      category: quote-freshness
      stage_gate: stage-a
      runbook: docs/runbooks/prediction-stage-a-observability.md#stale-quote-triage

  - id: prediction_dflow_guarded_rejection_spike
    description: Guarded-live risk rejections are elevated and may indicate cap drift.
    expr: sum(rate(dflow_guarded_rejections_total[10m])) > 0.2
    for: 10m
    severity: sev2
    labels:
      category: execution-guardrails
      stage_gate: stage-c
      runbook: docs/runbooks/prediction-stage-c-dflow-guarded-live.md#guarded-rejection-triage

  - id: prediction_dflow_live_without_approval
    description: Any live execution without approval trail is a hard policy breach.
    expr: increase(dflow_live_without_approval_total[1m]) > 0
    for: 0m
    severity: sev1
    labels:
      category: execution-approval
      stage_gate: stage-c
      runbook: docs/runbooks/prediction-stage-c-dflow-guarded-live.md#approval-trail-breach

  - id: prediction_dflow_naked_exposure_violation
    description: No-naked-exposure guard should never be bypassed in Stage C.
    expr: increase(dflow_naked_exposure_violations_total[1m]) > 0
    for: 0m
    severity: sev1
    labels:
      category: risk
      stage_gate: stage-c
      runbook: docs/runbooks/prediction-stage-c-dflow-guarded-live.md#naked-exposure-violation

  - id: prediction_gemini_guarded_rejection_spike
    description: Gemini guarded-live risk rejections are elevated and may indicate cap drift.
    expr: sum(rate(gemini_guarded_rejections_total[10m])) > 0.2
    for: 10m
    severity: sev2
    labels:
      category: execution-guardrails
      stage_gate: stage-c
      runbook: docs/runbooks/prediction-stage-c-gemini-guarded-live.md#guarded-rejection-triage

  - id: prediction_gemini_live_without_approval
    description: Any Gemini live execution without approval trail is a hard policy breach.
    expr: increase(gemini_live_without_approval_total[1m]) > 0
    for: 0m
    severity: sev1
    labels:
      category: execution-approval
      stage_gate: stage-c
      runbook: docs/runbooks/prediction-stage-c-gemini-guarded-live.md#approval-trail-breach

  - id: prediction_gemini_naked_exposure_violation
    description: Gemini no-naked-exposure guard should never be bypassed in Stage C.
    expr: increase(gemini_naked_exposure_violations_total[1m]) > 0
    for: 0m
    severity: sev1
    labels:
      category: risk
      stage_gate: stage-c
      runbook: docs/runbooks/prediction-stage-c-gemini-guarded-live.md#naked-exposure-violation
